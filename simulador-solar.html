<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Ahorro Solar 2026 | Tu Ahorro Eficiente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { DEFAULT: '#01488e', dark: '#003366', light: '#e6f0fa' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased font-sans min-h-screen flex flex-col">

    <nav class="bg-white border-b border-slate-100 py-4">
        <div class="max-w-5xl mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 group">
                <div class="bg-brand text-white p-2 rounded-lg group-hover:bg-brand-dark transition">
                    <i data-lucide="sun" class="w-5 h-5"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tighter text-slate-950">TuAhorro<span class="text-brand">Eficiente</span></span>
            </a>
            <a href="index.html" class="text-sm font-bold text-slate-500 hover:text-brand transition flex items-center gap-1">
                <i data-lucide="chevron-left" class="w-4 h-4"></i> Volver al inicio
            </a>
        </div>
    </nav>

    <main class="flex-grow py-12 md:py-20 px-6">
        <div class="max-w-2xl mx-auto text-center mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tighter text-slate-950 mb-4">Simulador de Instalación Fotovoltaica</h1>
            <p class="text-slate-500 font-medium text-lg">Calcula tu potencial de generación y ahorro anual en 30 segundos.</p>
        </div>

        <div class="max-w-xl mx-auto bg-white rounded-[2.5rem] shadow-2xl shadow-blue-900/5 border border-slate-100 p-8 md:p-12">
            <div class="space-y-8">
                <div>
                    <label class="block text-sm font-bold text-slate-500 uppercase tracking-wider mb-3">Gasto mensual en luz (€)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-xl">€</span>
                        <input type="number" id="gasto" placeholder="Ej: 100" 
                            class="w-full pl-10 pr-4 py-5 bg-slate-50 border-2 border-transparent focus:border-brand focus:bg-white rounded-2xl outline-none transition-all text-2xl font-extrabold text-slate-900">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-500 uppercase tracking-wider mb-3 text-left">Tu Ubicación (Radiación Solar)</label>
                    <select id="zona" class="w-full p-5 bg-slate-50 border-2 border-transparent focus:border-brand focus:bg-white rounded-2xl outline-none transition-all font-semibold text-slate-700 appearance-none cursor-pointer">
                        <option value="1.5">Sur de España / Islas (Máximo sol)</option>
                        <option value="1.3">Centro / Levante (Sol alto)</option>
                        <option value="1.1">Norte de España (Sol moderado)</option>
                    </select>
                </div>

                <button onclick="calcularSolar()" 
                    class="w-full bg-brand text-white py-6 rounded-2xl font-extrabold text-lg shadow-xl shadow-brand/20 hover:bg-brand-dark hover:-translate-y-1 transition-all flex items-center justify-center gap-3">
                    <i data-lucide="zap" class="w-6 h-6"></i> CALCULAR AHORRO SOLAR
                </button>
            </div>

            <div id="resultado-solar" class="hidden mt-12 pt-12 border-t border-slate-100">
                <div class="grid grid-cols-1 gap-4">
                    <div class="bg-brand text-white p-8 rounded-3xl text-center">
                        <p class="text-blue-200 font-bold uppercase tracking-widest text-[10px] mb-1">Ahorro anual estimado</p>
                        <div id="ahorro-anual" class="text-5xl font-black tracking-tighter">0€</div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100 text-center">
                            <p class="text-slate-400 font-bold text-[10px] uppercase mb-1">Placas recomendadas</p>
                            <div id="placas" class="text-2xl font-extrabold text-slate-950">0</div>
                        </div>
                        <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100 text-center">
                            <p class="text-slate-400 font-bold text-[10px] uppercase mb-1">Amortización aprox.</p>
                            <div id="años" class="text-2xl font-extrabold text-slate-950">0 años</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-12 text-center text-slate-400 text-[10px] font-bold border-t border-slate-100 mt-12 uppercase tracking-[0.2em]">
        &copy; 2026 Tu Ahorro Eficiente - Datos basados en promedios del IDAE
    </footer>

    <script>
        lucide.createIcons();

        function calcularSolar() {
            const gastoMensual = parseFloat(document.getElementById('gasto').value);
            const factorZona = parseFloat(document.getElementById('zona').value);
            
            if(gastoMensual > 0) {
                // Algoritmo simple de estimación solar 2026
                const placasNecesarias = Math.ceil((gastoMensual / 15) * 1.2);
                const ahorroAnual = gastoMensual * 12 * 0.75 * (factorZona / 1.3);
                const inversionAprox = placasNecesarias * 800; // 800€ por placa instalada aprox
                const amortizacion = inversionAprox / ahorroAnual;

                document.getElementById('ahorro-anual').innerText = Math.round(ahorroAnual).toLocaleString() + "€";
                document.getElementById('placas').innerText = placasNecesarias;
                document.getElementById('años').innerText = amortizacion.toFixed(1) + " años";
                
                document.getElementById('resultado-solar').classList.remove('hidden');
                document.getElementById('resultado-solar').scrollIntoView({ behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
